name: "innovatex-ide"
arch: "${NFPM_ARCH}"
platform: "linux"
version: "v${VERSION}"
section: "devel"
priority: "optional"
maintainer: "Joe Previte <joe@innovatex.com>"
description: |
  Run VS Code in the browser.
vendor: "InnovateX"
homepage: "https://github.com/innovatex-official/IDE"
license: "MIT"

contents:
  - src: ./ci/build/innovatex-ide-nfpm.sh
    dst: /usr/bin/innovatex-ide

  - src: ./ci/build/innovatex-ide@.service
    dst: /usr/lib/systemd/system/innovatex-ide@.service

  - src: ./ci/build/innovatex-ide-user.service
    dst: /usr/lib/systemd/user/innovatex-ide.service

  - src: ./release/*
    dst: /usr/lib/innovatex-ide
